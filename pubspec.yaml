version: 0.1.0

environment:
  sdk: '>=3.0.3 <4.0.0'

dependencies:
  # drift capped <2.33: stacked_generator 1.6.2 constrains sqlite3 <3.0.0
  drift: '>=2.30.0 <2.33.0'
